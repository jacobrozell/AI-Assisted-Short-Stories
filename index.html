<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI-Assisted Short Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0e0c0a;
    --paper: #f5f0e8;
    --fade: #7a6e60;
    --gold: #b8963e;
    --serif: 'EB Garamond', Georgia, serif;
    --display: 'Playfair Display', 'Times New Roman', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1e1a16;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: var(--serif);
    color: var(--ink);
  }
  .page {
    background: var(--paper);
    max-width: 520px;
    width: 100%;
    padding: 3rem 2.5rem;
    box-shadow:
      0 0 0 1px #c0b49a,
      0 12px 40px rgba(0,0,0,0.45);
  }
  h1 {
    font-family: var(--display);
    font-size: 2rem;
    font-weight: 400;
    text-align: center;
    margin-bottom: 0.35rem;
    line-height: 1.2;
  }
  .sub {
    text-align: center;
    color: var(--fade);
    font-size: 1rem;
    margin-bottom: 2.25rem;
  }
  ul {
    list-style: none;
    border-top: 1px solid rgba(14,12,10,0.12);
    padding-top: 1.5rem;
  }
  li + li { margin-top: 1.1rem; }
  a {
    color: var(--ink);
    text-decoration: none;
    font-size: 1.15rem;
    border-bottom: 1px solid var(--gold);
    padding-bottom: 0.05rem;
  }
  a:hover { color: #5c4a32; }
  .meta {
    display: block;
    font-size: 0.9rem;
    color: var(--fade);
    margin-top: 0.25rem;
    border: none;
    padding: 0;
  }
  .meta:hover { color: var(--fade); }
</style>
</head>
<body>
<main class="page">
  <h1>AI-Assisted<br>Short Stories</h1>
  <p class="sub">Static HTML — one folder per story</p>
  <ul>
    <li>
      <div><a href="sovereigns-silence/index.html">The Sovereign&rsquo;s Silence</a></div>
      <a class="meta" href="sovereigns-silence/outline.html">Outline</a>
    </li>
    <li>
      <div><a href="the-anniversary/the-anniversary.html">The Anniversary</a></div>
      <a class="meta" href="the-anniversary/anniversary-outline.html">Outline</a>
    </li>
  </ul>
</main>
</body>
</html>
